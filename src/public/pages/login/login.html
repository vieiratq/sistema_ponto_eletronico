<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Sistema de Ponto</title>
  <link rel="stylesheet" href="./login.css">
</head>
<body>
  <main class="login-page">
    <section class="brand-panel" aria-label="Apresentacao do sistema">
      <p class="eyebrow">Sistema de Ponto</p>
      <h1>Ponto eletronico simples e seguro</h1>
      <p class="brand-text">
        Acesse sua conta para registrar horarios e acompanhar sua jornada de trabalho.
      </p>
    </section>

    <section class="login-card" aria-label="Formulario de login">
      <div class="card-header">
        <p class="eyebrow">Bem-vindo de volta</p>
        <h2>Entrar na conta</h2>
        <p>Use seu e-mail corporativo e senha para acessar o painel.</p>
      </div>

      <form id="loginForm" class="login-form" novalidate>
        <label for="email">E-mail</label>
        <input
          id="email"
          name="email"
          type="email"
          autocomplete="email"
          placeholder="voce@empresa.com"
          required
        >

        <label for="password">Senha</label>
        <div class="password-field">
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            placeholder="Digite sua senha"
            required
          >
          <button id="togglePassword" type="button" aria-label="Mostrar senha">Mostrar</button>
        </div>

        <p id="formMessage" class="form-message" aria-live="polite"></p>

        <button class="submit-button" type="submit">Entrar</button>
      </form>

      <a class="support-link" href="mailto:suporte@sistemadeponto.com">
        Contato com suporte
      </a>
    </section>
  </main>

  <script type="module" src="./login.js"></script>
</body>
</html>
